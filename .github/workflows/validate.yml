name: Validate Skill
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax Check
        # 这是一个“烟雾测试”，确保 JavaScript 没有语法错误
        run: node --check adaptive-optimizer.js
