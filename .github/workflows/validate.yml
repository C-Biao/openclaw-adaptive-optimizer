name: Validate Skill
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Opt-in to the Node 24 runner for all jobs in this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Keeping your skill validation on Node 22 (LTS)

      - name: Syntax Check
        run: node --check adaptive-optimizer.js
