name: Validate Skill
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    # 将环境变量直接注入 Job 运行时
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Code
        # 升级到 v5：原生支持 Node 24 运行时
        uses: actions/checkout@v5

      - name: Setup Node.js
        # 升级到 v5：修复 Node 20 弃用警告
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Syntax Check
        run: node --check adaptive-optimizer.js
